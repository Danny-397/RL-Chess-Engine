# Render blueprint for the RL-Chess-Engine web UI.
# Deploy by pointing Render at this repo (New + -> Blueprint), or replicate the
# build/start commands below in a manual "Web Service".
#
# The web demo uses the classical alpha-beta engine (no PyTorch), so the build is
# tiny and the service runs comfortably on the free instance. It serves both the
# board page and the API from one URL -- a complete, playable site.
services:
  - type: web
    name: rl-chess-engine
    runtime: python
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r requirements-web.txt"
    startCommand: "uvicorn web.server:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      # Alpha-beta search depth: higher = stronger but slower. 3 is snappy; 4 is
      # stronger (~a few seconds per move).
      - key: RLCHESS_DEPTH
        value: "3"
      - key: PYTHON_VERSION
        value: "3.12.4"
