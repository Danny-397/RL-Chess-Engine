# Render blueprint for the RL-Chess-Engine web UI.
# Deploy by pointing Render at this repo (New + -> Blueprint), or replicate the
# build/start commands below in a manual "Web Service".
#
# Two things make this work on Render:
#   1. CPU-only PyTorch -- the default `pip install torch` pulls a multi-GB CUDA
#      wheel that overflows the build; the cpu index keeps it small.
#   2. Binding to Render's $PORT on 0.0.0.0 (not the local 127.0.0.1 default).
services:
  - type: web
    name: rl-chess-engine
    runtime: python
    plan: free  # NOTE: PyTorch is memory-hungry; bump to a larger plan if the
                # free instance OOMs on model load (see README for details).
    buildCommand: "pip install --upgrade pip && pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install -r requirements.txt"
    startCommand: "uvicorn web.server:app --host 0.0.0.0 --port $PORT"
    envVars:
      # Fewer MCTS simulations -> snappier responses on a small CPU instance.
      - key: RLCHESS_SIMULATIONS
        value: "60"
      - key: PYTHON_VERSION
        value: "3.12.4"
